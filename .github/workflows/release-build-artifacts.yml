name: Release Build Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-release-artifact:
    name: Build ${{ matrix.platform }} artifact
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            bazel_output_user_root: ''
          - platform: linux
            runner: ubuntu-latest
            bazel_output_user_root: ''
          - platform: windows
            runner: windows-latest
            bazel_output_user_root: C:/b

    steps:
      - name: Configure Git line endings
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Show Bazel version
        env:
          BAZEL_OUTPUT_USER_ROOT: ${{ matrix.bazel_output_user_root }}
        run: |
          if [[ -n "${BAZEL_OUTPUT_USER_ROOT}" ]]; then
            bazel "--output_user_root=${BAZEL_OUTPUT_USER_ROOT}" version
          else
            bazel version
          fi

      - name: Build scoped release artifact
        env:
          BUILD_MODE: bazel-opt
          BAZEL_OUTPUT_USER_ROOT: ${{ matrix.bazel_output_user_root }}
        run: bash tools/release/build_release_artifact.sh "${{ matrix.platform }}" "$PWD/release-artifacts"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: slic3r-${{ matrix.platform }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            release-artifacts/${{ matrix.platform }}/archives/*
            release-artifacts/${{ matrix.platform }}/release-manifest.txt
